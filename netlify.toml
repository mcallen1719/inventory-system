[build]
  # Vite builds to `dist/`
  publish = "dist"
  # Netlify will run this to build
  command = "npm run build"

[[redirects]]
  # SPA routing: send everything to index.html
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

# Optional: cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
